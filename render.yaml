# Render Blueprint for «Контроль СИЗ и оборудования».
# Creates: a free PostgreSQL database, the FastAPI backend (Web Service),
# and the React frontend (Static Site).
#
# After the first deploy you must set two values that depend on the
# generated service URLs (see README, section "Деплой на Render"):
#   - backend  CORS_ORIGINS  -> the frontend static-site URL
#   - frontend VITE_API_URL  -> the backend web-service URL
# then trigger a redeploy of the affected service.

databases:
  - name: siz-control-db
    plan: free
    databaseName: siz_control
    user: siz_control

services:
  # ---------------- Backend (FastAPI) ----------------
  - type: web
    name: siz-control-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Seed is idempotent: it creates roles/departments/admin once and only
    # inserts demo data into an empty database.
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: siz-control-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: ADMIN_LOGIN
        value: admin
      - key: ADMIN_PASSWORD
        sync: false # set your own admin password in the dashboard
      - key: CORS_ORIGINS
        sync: false # set to the frontend URL after first deploy
      - key: PYTHON_VERSION
        value: "3.12.7"

  # ---------------- Frontend (React static) ----------------
  - type: web
    name: siz-control-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # set to the backend URL after first deploy
    routes:
      # SPA fallback so client-side routes resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
